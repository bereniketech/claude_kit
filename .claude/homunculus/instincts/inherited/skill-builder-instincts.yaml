# claude_kit generate-claude-md Update

## Action

After adding any new skill, always update `skills/core/generate-claude-md/SKILL.md` to include the new skill in its category table. Also update `CLAUDE.md` if the skill represents a new category.

## Evidence

- `generate-claude-md` is the orchestrator — it must know about every skill to select correctly.
- Stale skill tables cause consumers to miss newly added skills.

