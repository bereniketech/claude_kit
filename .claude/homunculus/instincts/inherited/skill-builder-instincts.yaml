# claude_kit Merge Before Create

## Action

Before creating a new skill, check all 52 existing skills for overlap. If an existing skill covers >50% of the new content, merge instead of creating a separate file.

## Evidence

- During ECC integration, many ECC skills were merged into existing ones (e.g., exa-search → research, deep-research → research, deployment-patterns → terminal-cli-devops).
- Duplicate skills fragment knowledge and make the library harder to navigate.

