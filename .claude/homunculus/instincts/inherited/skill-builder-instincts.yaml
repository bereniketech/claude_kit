# claude_kit Conventional Commits

## Action

Use conventional commit prefixes: `feat:`, `fix:`, `docs:`, `chore:`, `refactor:`. Keep subjects under 70 characters.

## Evidence

- Consistent commit history aids changelog generation and skill attribution.
