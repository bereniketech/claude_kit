# claude_kit Root Structure

## Action

Keep `.claude/` minimal — only `package-manager.json`, `homunculus/instincts/`, and `skills/claude-kit/SKILL.md`. All distributable content (skills, agents, commands, rules, contexts, hooks, mcp-configs) belongs at the root level.

## Evidence

- The repo mirrors ECC's library architecture: root = distributable content, `.claude/` = repo meta only.
- Moving distributable content into `.claude/` would break the pure-library model.

