# claude_kit WAT Format

## Action

Always use the WAT format: YAML frontmatter (name + description only), one-line intro, numbered sections with `---` separators, second-person imperative instructions, bold `**Rule:**` callouts. Never use `allowed-tools` in frontmatter — it is unsupported.

## Evidence

- All 52 skills in the library follow this format consistently.
- `allowed-tools` was removed from every file during the ECC integration as it caused validation errors.

